# ============================================================
# QA STLC Command Center — GitHub Actions Agent
# ============================================================
# Trigger this workflow manually from:
#   GitHub UI  → Actions → "QA Analysis Workflow" → Run workflow
#   GitHub CLI → gh workflow run qa-workflow.yml --field jira_id=CRFLT-101 ...
#   REST API   → POST /repos/{owner}/{repo}/actions/workflows/qa-workflow.yml/dispatches
# ============================================================

name: QA Analysis Workflow

on:
  workflow_dispatch:
    inputs:
      jira_id:
        description: "Jira ticket ID  (e.g. CRFLT-123)"
        required: true
        type: string

      team_id:
        description: "Team"
        required: true
        type: choice
        options:
          - statements
          - confirms
          - letters

      triggered_by:
        description: "Your name (shows in audit history)"
        required: false
        default: ""        # falls back to github.actor below

      # ── Workflow step toggles ────────────────────────────
      step_ticket_quality:
        description: "Run: Story Quality Assessment"
        required: false
        type: boolean
        default: true

      step_code_alignment:
        description: "Run: Code–Jira Alignment check"
        required: false
        type: boolean
        default: true

      step_test_cases:
        description: "Run: Generate Test Cases"
        required: false
        type: boolean
        default: true

      step_bdd_scenarios:
        description: "Run: Generate BDD / Gherkin scenarios"
        required: false
        type: boolean
        default: true

      step_step_definitions:
        description: "Run: Generate pytest-bdd Step Definitions"
        required: false
        type: boolean
        default: true

      step_def_style:
        description: "Step-definition style"
        required: false
        type: choice
        default: pytest_bdd
        options:
          - pytest_bdd
          - generic

      # ── Post-run actions ─────────────────────────────────
      upload_to_jira:
        description: "Upload QA summary + report to Jira ticket"
        required: false
        type: boolean
        default: true

      create_pr:
        description: "Push generated tests & open a PR in automation repo"
        required: false
        type: boolean
        default: false

      custom_prompt:
        description: "Extra instructions for the AI (optional)"
        required: false
        type: string
        default: ""

env:
  PYTHON_VERSION: "3.11"
  # FastAPI server spun up on the runner
  API_BASE: "http://localhost:8000/api/v1"
  SERVER_STARTUP_SECS: 15

jobs:
  qa-analysis:
    name: "QA Analysis — ${{ inputs.jira_id }} (${{ inputs.team_id }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 3. Build .env from GitHub Secrets ───────────────────────────────
      - name: Create .env from secrets
        run: |
          cat > .env << 'EOF'
          APP_NAME=QA Agent Platform
          APP_VERSION=1.0.0
          DEBUG=false

          LLM_PROVIDER=${{ vars.LLM_PROVIDER || 'github' }}
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL=${{ vars.OPENAI_MODEL || 'gpt-4o' }}
          LLM_TEMPERATURE=0.2
          LLM_MAX_TOKENS=4096

          USE_MOCK_JIRA=${{ vars.USE_MOCK_JIRA || 'false' }}
          JIRA_BASE_URL=${{ secrets.JIRA_BASE_URL }}
          JIRA_API_TOKEN=${{ secrets.JIRA_API_TOKEN }}
          JIRA_EMAIL=${{ secrets.JIRA_EMAIL }}
          JIRA_PROJECT_KEY=${{ vars.JIRA_PROJECT_KEY || 'CRFLT' }}

          USE_MOCK_GITHUB=${{ vars.USE_MOCK_GITHUB || 'false' }}
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_OWNER=${{ github.repository_owner }}
          GITHUB_REPO_NAME=${{ github.event.repository.name }}
          GITHUB_AUTOMATION_REPO=${{ vars.GITHUB_AUTOMATION_REPO || '' }}

          REPORTS_PATH=outputs/reports
          TESTCASES_PATH=outputs/testcases
          BDD_PATH=outputs/bdd
          EOF

      # ── 4. Start FastAPI server in background ───────────────────────────
      - name: Start QA API server
        run: |
          mkdir -p outputs/reports outputs/testcases outputs/bdd
          nohup uvicorn app.main:app --host 0.0.0.0 --port 8000 > server.log 2>&1 &
          echo "SERVER_PID=$!" >> $GITHUB_ENV

      - name: Wait for server to be ready
        run: |
          echo "Waiting up to ${{ env.SERVER_STARTUP_SECS }}s for server..."
          for i in $(seq 1 ${{ env.SERVER_STARTUP_SECS }}); do
            if curl -sf ${{ env.API_BASE }}/health > /dev/null 2>&1; then
              echo "Server is ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Server did not start in time — dumping log:"
          cat server.log
          exit 1

      # ── 5. Run QA Analysis ──────────────────────────────────────────────
      - name: Run QA Workflow
        id: qa_run
        run: |
          python scripts/trigger_qa.py \
            --jira-id      "${{ inputs.jira_id }}" \
            --team-id      "${{ inputs.team_id }}" \
            --triggered-by "${{ inputs.triggered_by || github.actor }}" \
            --quality      "${{ inputs.step_ticket_quality }}" \
            --alignment    "${{ inputs.step_code_alignment }}" \
            --test-cases   "${{ inputs.step_test_cases }}" \
            --bdd          "${{ inputs.step_bdd_scenarios }}" \
            --step-defs    "${{ inputs.step_step_definitions }}" \
            --step-style   "${{ inputs.step_def_style }}" \
            --upload-jira  "${{ inputs.upload_to_jira }}" \
            --create-pr    "${{ inputs.create_pr }}" \
            --custom-prompt "${{ inputs.custom_prompt }}" \
            --api-base     "${{ env.API_BASE }}" \
            --output-dir   "outputs"

      # ── 6. Upload artefacts ─────────────────────────────────────────────
      - name: Upload QA artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "qa-results-${{ inputs.jira_id }}-${{ github.run_number }}"
          path: |
            outputs/reports/*.html
            outputs/testcases/*.csv
            outputs/testcases/*.json
            outputs/bdd/*.feature
            outputs/step_definitions/*.py
            qa_summary_*.json
          retention-days: 30

      # ── 7. Job summary (visible in Actions UI) ─────────────────────────
      - name: Write job summary
        if: always()
        run: |
          if [ -f qa_summary_*.json ]; then
            python scripts/render_summary.py qa_summary_*.json >> $GITHUB_STEP_SUMMARY
          else
            echo "### QA Run — ${{ inputs.jira_id }}" >> $GITHUB_STEP_SUMMARY
            echo "_No summary file generated (check logs above)_" >> $GITHUB_STEP_SUMMARY
          fi

      # ── 8. Stop server ──────────────────────────────────────────────────
      - name: Stop API server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true
